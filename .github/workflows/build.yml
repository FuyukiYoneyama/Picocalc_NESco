name: Build firmware

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-firmware:
    name: Build Picocalc_NESco firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            gcc-arm-none-eabi \
            git \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib \
            ninja-build \
            python3

      - name: Checkout Pico SDK
        uses: actions/checkout@v6
        with:
          repository: raspberrypi/pico-sdk
          ref: 2.2.0
          path: pico-sdk
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build -G Ninja -DPICO_SDK_PATH="$GITHUB_WORKSPACE/pico-sdk"

      - name: Build
        run: cmake --build build -j4

      - name: Verify outputs
        run: |
          test -f build/Picocalc_NESco.elf
          test -f build/Picocalc_NESco.uf2
          banner="$(strings build/Picocalc_NESco.elf | grep 'PicoCalc NESco Ver\.' | head -n 1)"
          test -n "$banner"
          printf '%s\n' "$banner"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v7
        with:
          name: picocalc-nesco-firmware
          retention-days: 7
          path: |
            build/Picocalc_NESco.uf2
            build/Picocalc_NESco.elf
